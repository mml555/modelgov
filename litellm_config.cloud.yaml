# LiteLLM proxy config for real cloud providers. `model_name` is what Modelgov
# sends (must match modelgov.yaml); provider keys come from the env.

model_list:
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: openai/gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: openai/gpt-5
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: anthropic/claude-haiku
    litellm_params:
      model: anthropic/claude-3-5-haiku-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic/claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic/claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  # Local prompt-injection classifier (hybrid injection) — never a real model.
  - model_name: local/injection-guard
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
