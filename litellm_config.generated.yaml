# Gemini cloud models + demo LLM for the injection classifier (saves Gemini
# quota: each guarded request otherwise burns 2 Gemini calls).
model_list:
  - model_name: gemini/gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gemini/gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
