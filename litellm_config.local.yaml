# Local-only LiteLLM config for end-to-end testing with Ollama.
# Maps every model name modelgov.yaml references to a single local model, so
# the whole pipeline runs with NO external provider keys.
# Used by docker-compose.local.yml (layered over the simple stack).

model_list:
  # openai/gpt-4o-mini doubles as the injection guard model (per modelgov.yaml
  # safety.injection_model). Route it to the 3B model — large enough to follow
  # the one-word classify instruction reliably. The 1B model cannot.
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: ollama_chat/llama3.2:3b
      api_base: http://host.docker.internal:11434
  - model_name: openai/gpt-4o
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: http://host.docker.internal:11434
  - model_name: openai/gpt-5
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: http://host.docker.internal:11434
  - model_name: anthropic/claude-haiku
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: http://host.docker.internal:11434
  - model_name: anthropic/claude-sonnet
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: http://host.docker.internal:11434
  - model_name: anthropic/claude-opus
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: http://host.docker.internal:11434
  # Local prompt-injection classifier (hybrid injection) — never a real model.
  - model_name: local/injection-guard
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
