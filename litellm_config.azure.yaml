# Azure OpenAI provider config for `make start-azure` / `modelgov up azure`.
# model_name values must match modelgov.azure.example.yaml model_classes.
# Set AZURE_API_KEY, AZURE_API_BASE, AZURE_API_VERSION in .env — deployment
# names below must match your Azure resource.

model_list:
  - model_name: azure/gpt-4o-mini
    litellm_params:
      model: azure/gpt-4o-mini
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION
  - model_name: azure/gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION
  - model_name: azure/gpt-5
    litellm_params:
      model: azure/gpt-5
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION
  # Local prompt-injection classifier (hybrid injection) — never a real model.
  - model_name: local/injection-guard
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
