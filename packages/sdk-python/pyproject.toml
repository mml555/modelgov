[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modelgov"
version = "1.6.0"
description = "Modelgov API client. `feature` and `userType` are mandatory on every request."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Modelgov" }]
keywords = ["modelgov", "llm", "policy", "gateway", "budget", "safety"]
# Runtime deps carry conservative upper bounds so a future major release of a
# dependency can't break `pip install modelgov` for an already-published wheel.
# Bump the upper bound deliberately after testing against the new major.
dependencies = [
    "httpx>=0.27,<1.0",
    "typing_extensions>=4.0,<5.0; python_version < '3.11'",
]

[project.optional-dependencies]
dev = ["pytest", "respx"]

[project.urls]
Homepage = "https://github.com/mml555/modelgov"

[tool.hatch.build.targets.wheel]
packages = ["modelgov"]
# Ship the PEP 561 marker so consumers' type checkers use modelgov's annotations.
artifacts = ["modelgov/py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
