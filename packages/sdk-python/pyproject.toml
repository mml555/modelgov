[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-guard-sdk"
version = "0.0.0"
description = "Ai-Guard API client. `feature` and `userType` are mandatory on every request."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Ai-Guard" }]
keywords = ["ai-guard", "llm", "policy", "gateway", "budget", "safety"]
dependencies = [
    "httpx>=0.27",
    "typing_extensions>=4.0; python_version < '3.11'",
]

[project.optional-dependencies]
dev = ["pytest", "respx"]

[project.urls]
Homepage = "https://github.com/mml555/Ai-Guard"

[tool.hatch.build.targets.wheel]
packages = ["ai_guard"]
# Ship the PEP 561 marker so consumers' type checkers use ai_guard's annotations.
artifacts = ["ai_guard/py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
