# SPA static serving for the operator console. react-router uses client-side
# routes (/overview, /keys, …), so any unknown path falls back to index.html.
# The unprivileged nginx image listens on 8080 as a non-root user.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the fingerprinted assets; never cache the HTML entrypoint.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
