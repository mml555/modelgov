# Zero-secret LiteLLM proxy config for the one-command local setup. Every model
# name used by modelgov.yaml routes to the deterministic dev provider in
# tools/demo-llm. Use litellm_config.cloud.yaml for real OpenAI/Anthropic keys.

model_list:
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key
  - model_name: openai/gpt-4o
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key
  - model_name: openai/gpt-5
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key
  - model_name: anthropic/claude-haiku
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key
  - model_name: anthropic/claude-sonnet
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key
  - model_name: anthropic/claude-opus
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key
  # Local prompt-injection classifier (hybrid injection). A `local/` sentinel so
  # it never collides with a real provider model in a cloud setup.
  - model_name: local/injection-guard
    litellm_params:
      model: openai/modelgov-demo
      api_base: http://demo-llm:8080/v1
      api_key: demo-key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
