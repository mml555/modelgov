name: modelgov-prod

services:
  api:
    image: ${MODELGOV_API_IMAGE:?MODELGOV_API_IMAGE must point to a built immutable image}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
      presidio-analyzer:
        condition: service_healthy
      presidio-anonymizer:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      # Turns known dev-only defaults (e.g. the dev Langfuse overlay's keys)
      # into boot errors instead of silent production footguns.
      MODELGOV_PRODUCTION: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MODELGOV_API_KEY: ${MODELGOV_API_KEY:-}
      MODELGOV_API_KEYS: ${MODELGOV_API_KEYS:-}
      # One-time bootstrap admin key in env (then issue keys from the DB store).
      ALLOW_BOOTSTRAP_ADMIN_KEY: ${ALLOW_BOOTSTRAP_ADMIN_KEY:-false}
      DATABASE_URL: ${DATABASE_URL:?set a production Postgres URL}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set a LiteLLM master key}
      MODELGOV_CONFIG: /app/modelgov.yaml
      PRESIDIO_ANALYZER_URL: http://presidio-analyzer:3000
      PRESIDIO_ANONYMIZER_URL: http://presidio-anonymizer:3000
      REQUEST_BODY_LIMIT_BYTES: ${REQUEST_BODY_LIMIT_BYTES:-1048576}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      MAINTENANCE_ENABLED: ${MAINTENANCE_ENABLED:-true}
      IDEMPOTENCY_STALE_MS: ${IDEMPOTENCY_STALE_MS:-900000}
      IDEMPOTENCY_COMPLETED_RETENTION_MS: ${IDEMPOTENCY_COMPLETED_RETENTION_MS:-604800000}
      RESERVATION_STALE_MS: ${RESERVATION_STALE_MS:-900000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BUDGET_ALERT_WEBHOOK_URL: ${BUDGET_ALERT_WEBHOOK_URL:-}
      BUDGET_ALERT_WEBHOOK_SECRET: ${BUDGET_ALERT_WEBHOOK_SECRET:-}
      OBSERVABILITY_PROVIDER: ${OBSERVABILITY_PROVIDER:-none}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-false}
      IDEMPOTENCY_CAPTURE_CONTENT: ${IDEMPOTENCY_CAPTURE_CONTENT:-false}
      STRICT_PRICING: ${STRICT_PRICING:-false}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      # Explicitly allow unauthenticated /metrics on a private scrape network.
      METRICS_ALLOW_PUBLIC: ${METRICS_ALLOW_PUBLIC:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      OBSERVABILITY_CAPTURE_CONTENT_ALLOW: ${OBSERVABILITY_CAPTURE_CONTENT_ALLOW:-false}
      IDEMPOTENCY_CAPTURE_CONTENT_ALLOW: ${IDEMPOTENCY_CAPTURE_CONTENT_ALLOW:-false}
      # TLS to the DB. The bundled `postgres` service ships with SSL OFF, so the
      # default is `disable` (safe on the private compose network) with the
      # disable explicitly allowed. For MANAGED/REMOTE Postgres set
      # DATABASE_SSL=verify-full + DATABASE_SSL_CA in .env.production — the boot
      # guard REFUSES `disable` (and bare `require`) against a remote host.
      DATABASE_SSL: ${DATABASE_SSL:-disable}
      DATABASE_SSL_CA: ${DATABASE_SSL_CA:-}
      DATABASE_SSL_DISABLE_ALLOWED: ${DATABASE_SSL_DISABLE_ALLOWED:-true}
      DATABASE_SSL_NO_VERIFY_ALLOWED: ${DATABASE_SSL_NO_VERIFY_ALLOWED:-false}
      # Trust your proxy's IP/CIDR so client IPs (and rate-limit fallback) are real.
      MODELGOV_BEHIND_PROXY: ${MODELGOV_BEHIND_PROXY:-false}
      TRUST_PROXY: ${TRUST_PROXY:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-60000}
      LITELLM_TIMEOUT_MS: ${LITELLM_TIMEOUT_MS:-60000}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-5000}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
      DB_RLS_ENABLED: ${DB_RLS_ENABLED:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      RATE_LIMIT_FAIL_OPEN: ${RATE_LIMIT_FAIL_OPEN:-false}
      REQUEST_LOG_RETENTION_MS: ${REQUEST_LOG_RETENTION_MS:-2592000000}
      BUDGET_ALERT_WEBHOOK_ALLOW_PRIVATE: ${BUDGET_ALERT_WEBHOOK_ALLOW_PRIVATE:-false}
      # DB-backed API key store (issue/rotate/revoke via /v1/admin/keys).
      API_KEYS_DB_ENABLED: ${API_KEYS_DB_ENABLED:-true}
      API_KEY_CACHE_TTL_MS: ${API_KEY_CACHE_TTL_MS:-10000}
      # Hierarchical (node-tree) budgets.
      HIERARCHICAL_BUDGETS: ${HIERARCHICAL_BUDGETS:-false}
      # Dynamic policy store + hot reload + two-person approval + per-tenant policy
      # (see docs/design/dynamic-policy.md). Without these lines the container
      # never sees the vars, so enabling them in .env.production is a silent no-op.
      POLICY_STORE_ENABLED: ${POLICY_STORE_ENABLED:-false}
      POLICY_HOT_RELOAD: ${POLICY_HOT_RELOAD:-true}
      POLICY_APPROVAL_REQUIRED: ${POLICY_APPROVAL_REQUIRED:-false}
      MULTI_TENANT_POLICY: ${MULTI_TENANT_POLICY:-false}
      POLICY_CACHE_TTL_MS: ${POLICY_CACHE_TTL_MS:-30000}
      MODELGOV_POLICY_ENV_ALLOWLIST: ${MODELGOV_POLICY_ENV_ALLOWLIST:-}
      # Operator SSO (OIDC). Set OIDC_ISSUER + OIDC_JWKS_URI + OIDC_AUDIENCE to enable.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_AUDIENCE_OPTIONAL: ${OIDC_AUDIENCE_OPTIONAL:-false}
      OIDC_ROLES_CLAIM: ${OIDC_ROLES_CLAIM:-roles}
      OIDC_NAME_CLAIM: ${OIDC_NAME_CLAIM:-sub}
      OIDC_ROLE_MAP: ${OIDC_ROLE_MAP:-}
      OIDC_TENANT_CLAIM: ${OIDC_TENANT_CLAIM:-}
      # OpenTelemetry OTLP/HTTP trace export (OBSERVABILITY_PROVIDER=otel).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-modelgov}
      # Stripe billing (modelgov.yaml `billing:` section). This env allowlist is
      # the only thing the container sees — without these lines, setting the
      # vars in .env.production silently does nothing.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # selfhost (default) or multitenant — gates tenant-isolation posture checks.
      MODELGOV_DEPLOY_PROFILE: ${MODELGOV_DEPLOY_PROFILE:-}
    volumes:
      - ./modelgov.yaml:/app/modelgov.yaml:ro
    ports:
      - "${MODELGOV_PUBLIC_PORT:-3000}:3000"
    healthcheck:
      # Node-based (no dependency on wget/busybox in the runtime image).
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512M}

  # In-cluster Postgres for self-hosted compose stacks. Prefer managed Postgres
  # (RDS, Cloud SQL, etc.) in production — set DATABASE_URL to it and omit this
  # service. POSTGRES_IMAGE defaults to official postgres:16-alpine in
  # .env.production.example; Trivy flags gosu stdlib CVEs in that image (scanner
  # noise — gosu is not on the request path). For a scanner-clean alternative
  # with the same POSTGRES_* env vars, use Chainguard (see .env.production.example).
  postgres:
    image: ${POSTGRES_IMAGE:?set a pinned postgres image}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a production DB password}
      POSTGRES_DB: ${POSTGRES_DB:-modelgov}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-2G}

  litellm:
    image: ${LITELLM_IMAGE:?set a pinned LiteLLM image}
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set a LiteLLM master key}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${LITELLM_MEMORY_LIMIT:-1G}

  presidio-analyzer:
    image: ${PRESIDIO_ANALYZER_IMAGE:?set a pinned Presidio analyzer image}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${PRESIDIO_MEMORY_LIMIT:-1G}

  presidio-anonymizer:
    image: ${PRESIDIO_ANONYMIZER_IMAGE:?set a pinned Presidio anonymizer image}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: ${REDIS_IMAGE:?set a pinned Redis image}
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256M}

volumes:
  pgdata:
