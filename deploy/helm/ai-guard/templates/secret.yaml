{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-guard.secretName" . }}
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
  {{- if .Values.migrations.enabled }}
  annotations:
    # Materialize before the migration hook (weight -5) so it can read
    # DATABASE_URL on first install. Kept (not deleted) so the API can use it.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
stringData:
  AI_GUARD_API_KEY: {{ required "secret.aiGuardApiKey is required (or set secret.existingSecret)" .Values.secret.aiGuardApiKey | quote }}
  DATABASE_URL: {{ required "secret.databaseUrl is required (or set secret.existingSecret)" .Values.secret.databaseUrl | quote }}
  LITELLM_MASTER_KEY: {{ required "secret.litellmMasterKey is required (or set secret.existingSecret). Generate a strong random value; there is no default." .Values.secret.litellmMasterKey | quote }}
  {{- if .Values.secret.metricsAuthToken }}
  METRICS_AUTH_TOKEN: {{ .Values.secret.metricsAuthToken | quote }}
  {{- end }}
  {{- range $k, $v := .Values.secret.providerKeys }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
