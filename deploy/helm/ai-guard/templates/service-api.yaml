apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-guard.fullname" . }}
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ai-guard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
