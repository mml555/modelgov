{{- if .Values.postgres.enabled }}
# DEV ONLY — a single-replica in-cluster Postgres. Use managed Postgres in
# production and set secret.databaseUrl to it (leave postgres.enabled=false).
# With this enabled, set migrations.enabled=false and let the API self-migrate
# (the pre-install hook would run before this Postgres is ready).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-guard.fullname" . }}-postgres
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-guard.fullname" . }}-postgres
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ai-guard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "ai-guard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-guard.fullname" . }}-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-guard.fullname" . }}-postgres
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    {{- include "ai-guard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
