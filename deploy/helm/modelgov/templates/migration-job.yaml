{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "modelgov.fullname" . }}-migrate
  labels:
    {{- include "modelgov.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run once before the API rolls — one migrator, never N replicas racing.
    # (The API image also self-migrates under a Postgres advisory lock, so this
    # is belt-and-suspenders.) Requires DATABASE_URL to already resolve — use a
    # managed Postgres, or set migrations.enabled=false with in-cluster postgres.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "modelgov.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "modelgov.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.api.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["node", "dist/migrate.js"]
          # migrate.js needs only DATABASE_URL (+ DATABASE_SSL), from the secret.
          envFrom:
            - secretRef:
                name: {{ include "modelgov.secretName" . }}
          env:
            {{- include "modelgov.deployProfileEnv" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
