apiVersion: v1
kind: Secret
metadata:
  name: ai-guard-secrets
  namespace: ai-guard
type: Opaque
stringData:
  AI_GUARD_API_KEY: REPLACE_ME
  DATABASE_URL: postgres://postgres:REPLACE@postgres:5432/aiguard
  LITELLM_MASTER_KEY: REPLACE_ME
  # Optional: require Bearer token for /metrics scrapes
  # METRICS_AUTH_TOKEN: REPLACE_ME
