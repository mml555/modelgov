apiVersion: v1
kind: Secret
metadata:
  name: modelgov-secrets
  namespace: modelgov
type: Opaque
stringData:
  MODELGOV_API_KEY: REPLACE_ME
  DATABASE_URL: postgres://postgres:REPLACE@postgres:5432/modelgov
  LITELLM_MASTER_KEY: REPLACE_ME
  # Optional: require Bearer token for /metrics scrapes
  # METRICS_AUTH_TOKEN: REPLACE_ME
