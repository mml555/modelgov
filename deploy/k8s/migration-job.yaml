apiVersion: batch/v1
kind: Job
metadata:
  name: modelgov-migrate
  namespace: modelgov
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/your-org/modelgov-api:REPLACE_TAG
          command: ["node", "dist/migrate.js"]
          envFrom:
            - secretRef:
                name: modelgov-secrets
          env:
            - name: MODELGOV_CONFIG
              value: /config/modelgov.yaml
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: modelgov-config
