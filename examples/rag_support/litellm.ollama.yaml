# Maps the "cloud" model names in modelgov.yaml → local Ollama, so the RAG demo
# runs with no cloud key. Pull the models first:
#   ollama pull llama3.2:3b && ollama pull nomic-embed-text
model_list:
  # Grounded chat. The 3B model follows the strict "cite verbatim, JSON only"
  # instruction far more reliably than 1B — grounding verification depends on it.
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: ollama_chat/llama3.2:3b
      api_base: http://host.docker.internal:11434

  # Embeddings. nomic-embed-text is a small, fast local embedding model.
  - model_name: openai/text-embedding-3-small
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
