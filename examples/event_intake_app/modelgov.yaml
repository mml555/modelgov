project:
  name: event-intake-demo
  environment: development

providers:
  openai:
    api_key: env/OPENAI_API_KEY
  anthropic:
    api_key: env/ANTHROPIC_API_KEY

budgets:
  global:
    monthly_usd: 300
    alert_at_percent: 80
    hard_stop_at_percent: 100
  by_user_type:
    admin:
      daily_usd: 2.00
      daily_requests: 5
      models: ["standard"]
    logged_in:
      daily_usd: 0.25
      daily_requests: 20
      models: ["cheap"]

features:
  event_flyer_extraction:
    safety: balanced
    model_class: standard
    max_tokens: 1500

routing:
  degrade_at_percent: 85

model_classes:
  standard:
    primary: anthropic/claude-sonnet
    fallback: openai/gpt-4o
  cheap:
    primary: openai/gpt-4o-mini
    fallback: anthropic/claude-haiku

safety:
  preset: balanced
  protect:
    pii: mask
    prompt_injection: block
  injection_model: openai/gpt-4o-mini

observability:
  provider: none
