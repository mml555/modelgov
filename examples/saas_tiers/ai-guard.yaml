project:
  name: saas-tiers-demo
  environment: development

providers:
  openai:
    api_key: env/OPENAI_API_KEY
  anthropic:
    api_key: env/ANTHROPIC_API_KEY

budgets:
  global:
    monthly_usd: 500
    alert_at_percent: 80
    hard_stop_at_percent: 100
  by_user_type:
    anonymous:
      daily_usd: 0.01
      daily_requests: 3
      models: ["cheap"]
    free_user:
      daily_usd: 0.05
      daily_requests: 20
      models: ["cheap"]
    paid_user:
      daily_usd: 0.50
      daily_requests: 100
      models: ["cheap", "standard"]
    admin:
      daily_usd: 5.00
      daily_requests: 500
      models: ["cheap", "standard", "premium"]

features:
  support_chat:
    safety: strict
    model_class: cheap
    max_tokens: 500

routing:
  degrade_at_percent: 80

model_classes:
  cheap:
    primary: openai/gpt-4o-mini
    fallback: anthropic/claude-haiku
  standard:
    primary: anthropic/claude-sonnet
    fallback: openai/gpt-4o
  premium:
    primary: openai/gpt-5
    fallback: anthropic/claude-opus

safety:
  preset: balanced
  protect:
    pii: mask
    prompt_injection: block
  injection_model: openai/gpt-4o-mini

observability:
  provider: none
