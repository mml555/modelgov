name: Bug report
description: Report a defect in Modelgov (gateway, policy engine, SDKs, CLI, or deploy artifacts).
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please **do not** report security vulnerabilities here —
        see the [security policy](https://github.com/mml555/modelgov/blob/main/SECURITY.md)
        for private disclosure.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched [existing issues](https://github.com/mml555/modelgov/issues?q=is%3Aissue) and this isn't a duplicate.
          required: true
        - label: This is a bug, not a security vulnerability (those go through the security policy).
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of Modelgov is affected?
      options:
        - API / gateway (packages/api)
        - Policy engine (packages/policy-engine)
        - TypeScript SDK (@modelgov/sdk)
        - Python SDK (modelgov)
        - CLI (@modelgov/cli) / create-modelgov
        - Deploy (Helm / Compose / Terraform / Docker)
        - Operator console
        - Docs / examples
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Include the request (feature, userType), config snippet, or command.
      placeholder: |
        1. Config: feature `support_chat`, protect.pii `mask`
        2. POST /v1/chat with ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / requestId / reasonCode
      description: Paste any error output, the `requestId` from the response, and the audit `reasonCode` if present. Redact secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or `git rev-parse HEAD`.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Local (from source / pnpm)
        - Docker Compose
        - Kubernetes (Helm)
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node/Python version, OS, Postgres version, provider (via LiteLLM), and whether hierarchical budgets / multi-tenant policy are enabled.
