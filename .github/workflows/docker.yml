name: docker

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-guard-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # No floating `latest` tag — deployments must reference an immutable
          # tag/digest (the git tag or the commit SHA).
          tags: |
            type=ref,event=tag
            type=sha,prefix=

      # Always build a single-arch image locally first so we can prove it BOOTS
      # (not just assembles) and scan it — before any release push happens.
      - name: Build for smoke + scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          load: true
          tags: ai-guard-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # `docker build` succeeding does NOT mean the container starts. This runs
      # the image and fails if a runtime dependency the bundle externalizes is
      # missing (the ERR_MODULE_NOT_FOUND-at-boot class of bug).
      - name: Runtime smoke test
        run: bash packages/api/scripts/docker-smoke.sh ai-guard-api:ci

      - name: Scan image for vulnerabilities
        # Pinned to the release commit SHA (not the mutable tag) after the
        # trivy-action tag-integrity incident; bump by SHA only.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ai-guard-api:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Release (tags): multi-arch build + push with provenance & SBOM
      # attestations. Reuses the layers cached by the smoke build above, and
      # only runs after the smoke test has proven the image boots.
      - name: Build and push (release)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-sidecars:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sidecar:
          - postgres:16-alpine
          - redis:7-alpine
    steps:
      - name: Scan sidecar image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: ${{ matrix.sidecar }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
