name: docker

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (e.g. 1.1.0) when running manually — used only on workflow_dispatch, e.g. to back-publish a release whose tag build predates a workflow fix."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/modelgov-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # No floating `latest` tag — deployments must reference an immutable
          # tag/digest (the git tag or the commit SHA).
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}

      # Always build a single-arch image locally first so we can prove it BOOTS
      # (not just assembles) and scan it — before any release push happens.
      - name: Build for smoke + scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          load: true
          tags: modelgov-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # `docker build` succeeding does NOT mean the container starts. This runs
      # the image and fails if a runtime dependency the bundle externalizes is
      # missing (the ERR_MODULE_NOT_FOUND-at-boot class of bug).
      - name: Runtime smoke test
        run: bash packages/api/scripts/docker-smoke.sh modelgov-api:ci

      - name: Scan image for vulnerabilities
        # Pinned to the release commit SHA (not the mutable tag) after the
        # trivy-action tag-integrity incident; bump by SHA only.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: modelgov-api:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Release (tags): build + push with provenance & SBOM attestations. Reuses
      # the layers cached by the smoke build above, and only runs after the smoke
      # test has proven the image boots.
      #
      # amd64-only for now: building linux/arm64 here means QEMU-emulating the
      # entire pnpm install + monorepo build (no arm64 cache), which repeatedly
      # hung for 50+ min and blocked the v1.1.0 image push. amd64 covers the vast
      # majority of container hosts. TODO: restore arm64 as a proper multi-arch
      # image via a native arm64 runner (matrix build per-arch + manifest merge),
      # not QEMU emulation.
      - name: Build and push (release)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-sidecars:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sidecar:
          - postgres:16-alpine
          - cgr.dev/chainguard/postgres:latest
          - redis:7-alpine
    steps:
      # These are floating public infra images (Postgres/Redis) used as dev/test/
      # compose sidecars — we neither build nor ship them, and cannot patch their
      # upstream CVEs. Official postgres:16-alpine reports gosu stdlib CVEs in
      # Trivy (scanner noise; see .env.production.example for Chainguard alt).
      # Newly-disclosed HIGH/CRITICAL advisories would otherwise turn CI red and
      # block merges until upstream rebuilds, which is outside our control. So
      # this scan is informational: it still runs and prints findings in the log,
      # but does not fail the job (exit-code 0). The shipped API image is scanned
      # as a blocking gate in the build job.
      - name: Scan sidecar image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.sidecar }}
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
