name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aiguard
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:55432/aiguard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
      - name: Wait for Postgres
        run: npx wait-on tcp:localhost:55432 --timeout 60000
      - run: pnpm generate-sdk-types
      - name: Generated SDK types are committed
        run: |
          git diff --exit-code packages/sdk-typescript/src/generated/config-types.ts \
            || (echo "::error::Run pnpm generate-sdk-types and commit the result" && exit 1)
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - name: Policy regression tests
        run: pnpm ai-guard test-policy --file ai-guard.policy-tests.yaml
      - name: Verify version surfaces
        run: bash scripts/verify-versions.sh
      - name: Production example deploy checks
        run: pnpm exec tsx scripts/doctor-production-example.ts
      - name: Validate production example config
        run: OPENAI_API_KEY=x ANTHROPIC_API_KEY=x pnpm ai-guard validate --config ai-guard.production.example.yaml --production
      - run: pnpm test:coverage 2>&1 | tee /tmp/test.log
      - name: Scaffold smoke (create-ai-guard)
        run: pnpm exec tsx scripts/scaffold-smoke.ts
      - name: Integration tests ran (not skipped)
        run: |
          if grep -E "↓ packages/api/test/(chat|usage|idempotency|reservationLeases|rejection-audit)" /tmp/test.log; then
            echo "::error::Integration tests were skipped — DATABASE_URL must be set in CI"
            exit 1
          fi
      - run: pnpm --filter @ai-guard/api openapi:export
      - name: OpenAPI spec is committed and current
        run: |
          git diff --exit-code packages/api/openapi.json \
            || (echo "::error::openapi.json is stale — run 'pnpm --filter @ai-guard/api openapi:export' and commit the result" && exit 1)
      - name: API boot smoke test
        run: bash scripts/smoke-ci.sh

  feature-flags:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aiguard
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:55432/aiguard
      HIERARCHICAL_BUDGETS: "true"
      MULTI_TENANT_POLICY: "true"
      POLICY_STORE_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Wait for Postgres
        run: npx wait-on tcp:localhost:55432 --timeout 60000
      - run: pnpm build
      - name: Feature-flag integration tests
        run: |
          pnpm exec vitest run \
            packages/api/test/chat-hierarchical.integration.test.ts \
            packages/api/test/budget-nodes.integration.test.ts \
            packages/api/test/policy-tenant.integration.test.ts \
            packages/api/test/policy-store.integration.test.ts \
            packages/api/test/rls-tenant.integration.test.ts

  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Docker compose e2e (optional example stack)
        run: bash scripts/example-e2e-ci.sh

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Validate AWS module
        working-directory: deploy/terraform/aws
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Python SDK with dev extras
        working-directory: packages/sdk-python
        run: pip install -e ".[dev]"
      - name: Run Python SDK tests
        working-directory: packages/sdk-python
        run: python -m pytest -q
